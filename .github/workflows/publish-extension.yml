name: Publish Extension

on:
  push:
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # - name: Verify tag matches package.json version
      #   run: |
      #     echo "GITHUB_REF: $GITHUB_REF"
      #     TAG="${GITHUB_REF#refs/tags/v}"
      #     PKG="$(node -p "require('./package.json').version")"
      #     echo "Package version: $PKG, Tag: $TAG"
      #     if [ "$TAG" != "$PKG" ]; then
      #       echo "Tag v$TAG does not match package.json version $PKG"
      #       exit 1
      #     fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify packaged extension contents
        run: npm run package:verify

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' is not in vN.N.N format"
            exit 1
          fi
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v$PKG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG (expected v$PKG)"
            exit 1
          fi

      - name: Verify tag is on main branch
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::Tag $GITHUB_REF points to commit $GITHUB_SHA which is not on the main branch; refusing to publish"
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx @vscode/vsce publish --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
